services:
  knowledgebase:
    build: .
    ports:
      - "8080:8080"
    environment:
      KB_HOST: "0.0.0.0"
      KB_PORT: "8080"
      KB_CONTENT_PATH: /kb/content
      KB_DB_PATH: /kb/data/kb.db
      KB_DEBUG: "false"
      KB_REINDEX_ON_STARTUP: "true"
      KB_SNIPPET_LENGTH: "240"
      KB_DEFAULT_SEARCH_LIMIT: "20"
      KB_MAX_SEARCH_LIMIT: "100"
    volumes:
      - ./content:/kb/content:ro
      - kb_data:/kb/data

volumes:
  kb_data:
